<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Relay — Packet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: rgba(0, 0, 0, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #111;
    }

    #modal {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      max-width: 560px;
      width: 90vw;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    h2 {
      margin: 0 0 20px;
      font-size: 18px;
      font-weight: 700;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 4px;
    }

    .field p,
    .field ul {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: #222;
      background: #f5f5f5;
      border-radius: 6px;
      padding: 10px 12px;
    }

    .field ul {
      padding-left: 28px;
    }

    .field ul li {
      line-height: 1.7;
    }

    #actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    #destination {
      flex: 1;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 14px;
      background: #fff;
    }

    #send-btn {
      padding: 9px 22px;
      border-radius: 6px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #send-btn:hover { background: #333; }
    #send-btn:disabled { opacity: 0.5; cursor: default; }

    #status {
      font-size: 13px;
      color: #e55;
      margin-top: 8px;
      min-height: 18px;
    }

    #close-btn {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #888;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div id="modal">
    <button id="close-btn" title="Close">×</button>
    <h2 id="topic">Loading…</h2>

    <div class="field" id="field-summary">
      <label>Summary</label>
      <p id="summary"></p>
    </div>

    <div class="field" id="field-decisions">
      <label>Decisions</label>
      <ul id="decisions"></ul>
    </div>

    <div class="field" id="field-open_questions">
      <label>Open Questions</label>
      <ul id="open_questions"></ul>
    </div>

    <div class="field" id="field-next_task">
      <label>Next Task</label>
      <p id="next_task"></p>
    </div>

    <div id="actions">
      <select id="destination">
        <option value="chatgpt">ChatGPT</option>
        <option value="claude">Claude (new chat)</option>
      </select>
      <button id="send-btn">Send</button>
    </div>
    <div id="status"></div>
  </div>

  <script src="modal.js"></script>
</body>
</html>
